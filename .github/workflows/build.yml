name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build uber-jar
        run: ./mvnw package -Dquarkus.package.jar.type=uber-jar -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfs-rss-runner
          path: target/*-runner.jar
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kfs-rss-runner

      - name: Rename JAR
        run: mv *-runner.jar kfs-rss-runner.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kfs-rss-runner.jar
          generate_release_notes: true
