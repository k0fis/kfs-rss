# kfs-rss backend
quarkus.http.port=8180

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/kfs_rss
quarkus.datasource.username=kfs_rss
quarkus.datasource.password=${DB_PASSWORD:changeme}

# Hibernate
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true

# Security — disable default 401 redirect, keep Basic auth
quarkus.http.auth.basic=true
quarkus.http.auth.form.enabled=false

# CORS (dev)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# RSS fetch config
kfs.rss.fetch-cron=0 */30 * * * ?
kfs.rss.fetch-timeout=15
kfs.rss.retention-days=30
kfs.rss.max-articles-per-feed=100
kfs.rss.user-agent=kfs-rss/2.0
